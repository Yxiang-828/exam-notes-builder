<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Notes</title>
    <!-- Modern Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" />
                    </svg>
                    <span>Exam Notes</span>
                </div>
            </div>
            <div class="sidebar-nav">
                <h3>Chapters</h3>
                <ul id="chapter-list">
                    <!-- Chapters will be injected here via JS -->
                </ul>
            </div>
            <div class="theme-toggle">
                <button id="toggle-theme-btn" title="Toggle Light/Dark Mode">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                    <svg class="moon-icon" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Header with Search -->
            <header class="top-header">
                <div class="search-container">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" id="global-search" placeholder="Search across all notes... (Ctrl+K)"
                        autocomplete="off">
                    <div class="search-shortcut">⌘K</div>
                </div>
            </header>

            <!-- Markdown content will be rendered here -->
            <article id="content-area" class="markdown-body">
                <div class="welcome-screen">
                    <h2>Welcome to your Exam Notes</h2>
                    <p>Select a chapter from the sidebar or start searching to begin studying.</p>
                </div>
            </article>
        </main>

        <!-- Search Overlay -->
        <div id="search-overlay" class="overlay hidden">
            <div class="search-modal">
                <div class="search-modal-header">
                    <input type="text" id="modal-search-input" placeholder="Type to search in all chapters..."
                        autofocus>
                    <button id="close-search-btn">Esc</button>
                </div>
                <div class="search-results" id="search-results-container">
                    <div class="empty-state">Start typing to search...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/marked.min.js"></script>
    <script src="js/chapters.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
